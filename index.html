<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Eleven Task Validator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border-t-4 border-red-600">
        <h2 class="text-2xl font-bold mb-2 text-gray-800">API Validator</h2>
        <p class="text-sm text-gray-500 mb-6">Test your endpoint against the One Eleven validation server.</p>
        
        <form id="validatorForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700">Email Address</label>
                <input type="email" id="email" required placeholder="your@email.com"
                    class="mt-1 block w-full border border-gray-300 rounded-md p-2.5 shadow-sm focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Your API Endpoint URL</label>
                <input type="url" id="apiUrl" required placeholder="https://your-app.onrender.com/webhook"
                    class="mt-1 block w-full border border-gray-300 rounded-md p-2.5 shadow-sm focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none">
                <p class="text-xs text-gray-400 mt-1 italic">Note: Remember to include /webhook at the end.</p>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-red-600 text-white font-bold py-3 px-4 rounded-md hover:bg-red-700 transition duration-200 shadow-md">
                Test My API
            </button>
        </form>

        <div id="responseContainer" class="mt-8 hidden">
            <div class="flex items-center justify-between mb-2">
                <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider">Validation Response:</h3>
                <span id="statusBadge" class="text-[10px] px-2 py-0.5 rounded-full font-bold uppercase"></span>
            </div>
            <pre id="responseOutput" class="p-4 bg-gray-900 text-green-400 rounded-md overflow-x-auto text-sm font-mono border border-gray-700 min-h-[100px]"></pre>
        </div>
    </div>

    <script>
        const form = document.getElementById('validatorForm');
        const container = document.getElementById('responseContainer');
        const output = document.getElementById('responseOutput');
        const submitBtn = document.getElementById('submitBtn');
        const badge = document.getElementById('statusBadge');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const url = document.getElementById('apiUrl').value;
            
            // UI Loading state
            submitBtn.disabled = true;
            submitBtn.textContent = "Processing...";
            container.classList.remove('hidden');
            output.textContent = "Connecting to validation server...\n(This may take up to 60s if your Render instance is sleeping)";
            output.classList.add('loading');
            badge.textContent = "Pending";
            badge.className = "text-[10px] px-2 py-0.5 rounded-full font-bold uppercase bg-yellow-100 text-yellow-700";

            // Construct validation URL based on task requirements 
            const validationUrl = `https://yhxzjyykdsfkdrmdxgho.supabase.co/functions/v1/application-task?url=${encodeURIComponent(url)}&email=${encodeURIComponent(email)}`;

            try {
                const response = await fetch(validationUrl);
                const data = await response.json();
                
                output.classList.remove('loading');
                submitBtn.disabled = false;
                submitBtn.textContent = "Test My API";

                if (response.ok) {
                    badge.textContent = "Success";
                    badge.className = "text-[10px] px-2 py-0.5 rounded-full font-bold uppercase bg-green-100 text-green-700";
                    output.className = "p-4 bg-gray-900 text-green-400 rounded-md overflow-x-auto text-sm font-mono border border-green-900";
                } else {
                    badge.textContent = "Failed";
                    badge.className = "text-[10px] px-2 py-0.5 rounded-full font-bold uppercase bg-red-100 text-red-700";
                    output.className = "p-4 bg-gray-900 text-red-400 rounded-md overflow-x-auto text-sm font-mono border border-red-900";
                }

                output.textContent = JSON.stringify(data, null, 2);

            } catch (error) {
                submitBtn.disabled = false;
                submitBtn.textContent = "Test My API";
                output.classList.remove('loading');
                badge.textContent = "Error";
                badge.className = "text-[10px] px-2 py-0.5 rounded-full font-bold uppercase bg-red-100 text-red-700";
                output.textContent = "Network Error: Could not connect to the server. Please check your URL and internet connection.";
            }
        });
    </script>
</body>
</html>
